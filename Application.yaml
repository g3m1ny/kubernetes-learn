apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
 name: sample-app
 namespace: argocd
spec:
  project: default
  source: 
     repoURL: https://github.com/g3m1ny/kubernetes-learn.git
     targetRevision: HEAD
     path: test
  destination: 
    server: https://kubernetes.default.svc
    namespace: mytestapp
  syncPolicy: 
    syncOptions: 
    - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
      